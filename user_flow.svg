<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#fff"/>

  <!-- Step 1: User sets up folder -->
  <rect x="30" y="30" width="200" height="70" rx="8" fill="#1F4E79"/>
  <text x="130" y="58" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1. Set up folder</text>
  <text x="130" y="78" text-anchor="middle" fill="#cfe0f0" font-size="11">jar + config + certs + templates</text>

  <line x1="230" y1="65" x2="290" y2="65" stroke="#444" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 2: Fill Excel -->
  <rect x="292" y="30" width="200" height="70" rx="8" fill="#2E754B"/>
  <text x="392" y="58" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2. Fill Excel</text>
  <text x="392" y="78" text-anchor="middle" fill="#d3ecdc" font-size="11">Environments, Tests, Steps, Data</text>

  <line x1="492" y1="65" x2="552" y2="65" stroke="#444" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 3: Run jar -->
  <rect x="554" y="30" width="200" height="70" rx="8" fill="#B7791F"/>
  <text x="654" y="58" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3. Run the jar</text>
  <text x="654" y="78" text-anchor="middle" fill="#fff6e9" font-size="11">java -jar api-test-suite.jar</text>

  <!-- Arrow down from "Run jar" -->
  <line x1="654" y1="100" x2="654" y2="145" stroke="#444" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- What happens box (internal) -->
  <rect x="80" y="148" width="700" height="230" rx="10" fill="#f7f9fb" stroke="#b0c4d8" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="430" y="172" text-anchor="middle" fill="#5b6b7d" font-size="12" font-style="italic">What happens inside the tool</text>

  <!-- Internal steps -->
  <rect x="120" y="192" width="155" height="52" rx="6" fill="#eef3f8" stroke="#1F4E79" stroke-width="1"/>
  <text x="197" y="214" text-anchor="middle" fill="#1F4E79" font-size="12" font-weight="bold">Read Excel</text>
  <text x="197" y="232" text-anchor="middle" fill="#33485e" font-size="10">parse config + secrets</text>

  <line x1="275" y1="218" x2="315" y2="218" stroke="#444" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="317" y="192" width="155" height="52" rx="6" fill="#fff6e9" stroke="#B7791F" stroke-width="1"/>
  <text x="394" y="214" text-anchor="middle" fill="#8a5a12" font-size="12" font-weight="bold">Auth + Send</text>
  <text x="394" y="232" text-anchor="middle" fill="#7a5012" font-size="10">fetch token, call APIs</text>

  <line x1="472" y1="218" x2="512" y2="218" stroke="#444" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="514" y="192" width="155" height="52" rx="6" fill="#e9f5ee" stroke="#2E754B" stroke-width="1"/>
  <text x="591" y="214" text-anchor="middle" fill="#2E754B" font-size="12" font-weight="bold">Compare</text>
  <text x="591" y="232" text-anchor="middle" fill="#33614a" font-size="10">field-by-field diff</text>

  <!-- Connects to endpoints -->
  <text x="197" y="280" text-anchor="middle" fill="#5b6b7d" font-size="10">reads from</text>
  <rect x="107" y="294" width="180" height="38" rx="5" fill="#fff" stroke="#b0c4d8" stroke-width="1"/>
  <text x="197" y="318" text-anchor="middle" fill="#444" font-size="11">config/ + templates/ + certs/</text>

  <text x="394" y="280" text-anchor="middle" fill="#5b6b7d" font-size="10">calls</text>
  <rect x="315" y="294" width="158" height="38" rx="5" fill="#fff" stroke="#b0c4d8" stroke-width="1"/>
  <text x="394" y="318" text-anchor="middle" fill="#444" font-size="11">Your API endpoints</text>

  <text x="591" y="280" text-anchor="middle" fill="#5b6b7d" font-size="10">optionally reads</text>
  <rect x="510" y="294" width="162" height="38" rx="5" fill="#fff" stroke="#b0c4d8" stroke-width="1"/>
  <text x="591" y="318" text-anchor="middle" fill="#444" font-size="11">expected/ + database</text>

  <!-- Down from the whole box to the report -->
  <line x1="430" y1="378" x2="430" y2="418" stroke="#444" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 4: Report -->
  <rect x="300" y="420" width="260" height="70" rx="8" fill="#1F4E79"/>
  <text x="430" y="449" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4. Open HTML report</text>
  <text x="430" y="470" text-anchor="middle" fill="#cfe0f0" font-size="11">reports/ folder — pass/fail, diffs, timings</text>
</svg>
